    <section class="more-content" id="overview">
      <div class="content-inner">
        <h1>OY Office</h1>
        <p>OY Officeは、「こんな文房具があったらいいな」というアイデアを形にすることを目指し、革新的な文房具の企画・開発を行う組織です。</p>

        <p>私たちは、日常の学習や仕事の中で感じる小さな不便や課題に注目し、これまでにない発想と3D CADなどの最新技術を活用して、新しい価値を持つ文房具を生み出しています。</p>

        <p>「使いやすさ」「楽しさ」「独創性」を大切にし、誰もがワクワクするような製品づくりに挑戦し続けています。OY Officeは、未来の文房具を創造し、人々の学びや創作活動をより豊かにすることを目指しています。</p>
      </div>
    </section>
